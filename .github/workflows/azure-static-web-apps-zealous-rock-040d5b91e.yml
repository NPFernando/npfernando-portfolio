name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  validate:
    if: github.event_name == 'push' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload production build artifact
        uses: actions/upload-artifact@v5
        with:
          name: static-web-app-dist
          path: dist
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: Deploy to Azure Static Web Apps
    needs: validate
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.AZURE_STATIC_WEB_APPS_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download production build artifact
        uses: actions/download-artifact@v5
        with:
          name: static-web-app-dist
          path: dist

      - name: Verify production build artifact
        run: test -f dist/index.html

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ZEALOUS_ROCK_040D5B91E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist
          api_location: ''
          output_location: ''
          skip_app_build: true

  close_pull_request:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      vars.AZURE_STATIC_WEB_APPS_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Close preview environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ZEALOUS_ROCK_040D5B91E }}
          action: close
          app_location: /
          api_location: ''
          output_location: dist
